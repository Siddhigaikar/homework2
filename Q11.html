<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@700&display=swap" rel="stylesheet">
     <style>

        h1 {
            color: darkblue;
            font-size: 40px;
            font-style: normal;
            font-weight: bold;

            font-family: 'Roboto', sans-serif;

            text-decoration: underline;
            text-transform: uppercase;

            letter-spacing: 4px;
            text-shadow: 2px 2px lightgray;
        }

        p {
            color: purple;
            font-size: 24px;
            font-style: italic;
            font-weight: 700;

            font-family: 'Pacifico', cursive;

            text-decoration: line-through;
            text-transform: capitalize;

            text-indent: 50px;
            letter-spacing: 3px;
        }

    </style>
</head>
<body>
    <h1>
        Welcome
    </h1>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quia consequuntur sit accusamus, placeat, laudantium fuga rerum porro ea, minus voluptatem dolore enim voluptas temporibus? Quo voluptatibus tenetur error incidunt enim!
    </p>
</body>
</html>
